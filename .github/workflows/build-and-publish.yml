name: Build and Publish to GHCR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Install Pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.7.4

      - name: Build with Cloud Native Buildpacks
        run: |
          pack build ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --builder heroku/builder:22 \
            --path . \
            --publish
        if: github.event_name != 'pull_request'

      - name: Tag additional images
        if: github.event_name != 'pull_request'
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          for TAG in $TAGS; do
            if [[ "$TAG" != *":latest" ]]; then
              docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest $TAG
              docker push $TAG
            fi
          done
